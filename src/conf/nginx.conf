
#user  nobody;
worker_processes  auto;
worker_cpu_affinity auto;

error_log  /var/log/openresty/error.log warn;

#pid        logs/nginx.pid;


events {
    worker_connections  10240;
    use epoll;
    multi_accept on;
}


http {
    include       mime.types;
    default_type  application/json;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '$request_time $upstream_response_time';

    log_format json_log escape=json '{'
            '"timestamp":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"status":$status,'
            '"duration_ms":$request_time,'
            '"client_ip":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"user_agent":"$http_user_agent",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';
    #access_log  logs/access.log  main;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 添加request_id
    map $http_x_request_id $real_request_id {
        default   $request_id;
        "~.+"     $http_x_request_id;
    }

    server {
        listen       80;
        server_name  api.0x00fafa.com;
        
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen       443 ssl;
	http2	on;
        server_name  api.0x00fafa.com;


        # SSL 证书配置
        ssl_certificate      /etc/letsencrypt/live/api.0x00fafa.com/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/api.0x00fafa.com/privkey.pem;

        # SSL 性能与安全性优化
        ssl_protocols TLSv1.2 TLSv1.3; # 禁用不安全的 TLS 1.0/1.1
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;

        # 会话缓存复用，减少握手开销
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # HSTS
        # add_header Strict-Transport-Security "max-age=63072000" always;

        access_log  /var/log/openresty/api.0x00fafa.com.access.log  json_log;

        location / {
            root   html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # 静态资源缓存控制
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
