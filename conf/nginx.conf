# OpenResty API Proxy Gateway - Nginx Configuration
#

# 声明环境变量（必须在 main 上下文，worker_processes 之前）
# 仅保留必要的基础环境变量，其他配置通过 config_manager 热加载
# Redis 连接配置（用于分布式限流和配置存储）
env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env REDIS_DB;

# 配置来源（local/redis）
env CONFIG_SOURCE;

worker_processes auto;
error_log /var/log/openresty/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/json;

    log_format json_log escape=json '{'
            '"timestamp":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"provider":"$provider",'
            '"method":"$request_method",'
            '"path":"$masked_path",'
            '"status":$status,'
            '"duration_ms":$request_time,'
            '"client_ip":"$remote_addr",'
            '"country_code":"$geoip_country_code",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"user_agent":"$http_user_agent",'
            '"upstream_status":"$lua_upstream_status",'
            '"upstream_response_time":"$lua_upstream_response_time"'
        '}';
    #access_log  logs/access.log  main;

    # Lua 模块路径（支持目录形式的模块，如 cache/init.lua）
    lua_package_path "/usr/local/openresty/lualib/custom/?.lua;/usr/local/openresty/lualib/custom/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";
    
    # 共享内存区域（用于熔断器、限流器、缓存和配置）
    lua_shared_dict circuit_breaker 1m;
    lua_shared_dict rate_limiter 10m;
    lua_shared_dict api_cache 50m;
    lua_shared_dict config_cache 1m;
    
    # DNS 解析器（用于 Lua HTTP 请求）
    resolver 8.8.8.8 8.8.4.4 ipv6=off;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 添加request_id
    map $http_x_onekey_request_id $real_request_id {
        default   $request_id;
        "~.+"     $http_x_request_id;
    }
    
    # GeoIP 初始化
    init_by_lua_block {
        require("init").init()
    }
    
    # 上游服务定义
    upstream zerion_upstream {
        server api.zerion.io:443;
        keepalive 100;
        keepalive_timeout 60s;
    }
    
    upstream coingecko_upstream {
        server api.coingecko.com:443;
        keepalive 100;
        keepalive_timeout 60s;
    }
    
    upstream alchemy_upstream {
        server eth-mainnet.g.alchemy.com:443;
        keepalive 100;
        keepalive_timeout 60s;
    }

    server {
        listen       80;
        server_name  api.0x00fafa.com;
        return 301 https://$server_name$request_uri;
    }
    
    # HTTPS server
    server {
        listen       443 ssl;
        http2   on;
        server_name  api.0x00fafa.com;
        
        # GeoIP 国家代码变量
        set $geoip_country_code "";
        
        # 脱敏后的路径变量（用于日志记录）
        set $masked_path "";
        
        # 上游状态变量（用于日志记录，Lua HTTP客户端使用）
        set $lua_upstream_status "";
        set $lua_upstream_response_time "";

        # SSL 证书配置
        ssl_certificate      /usr/local/openresty/nginx/ssl/fullchain1.pem;
        ssl_certificate_key  /usr/local/openresty/nginx/ssl/privkey1.pem;

        # SSL 性能与安全性优化
        ssl_protocols TLSv1.2 TLSv1.3; # 禁用不安全的 TLS 1.0/1.1
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;

        # 会话缓存复用，减少握手开销
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # HSTS
        # add_header Strict-Transport-Security "max-age=63072000" always;

        access_log  /var/log/openresty/access.log  json_log;
        
        # GeoIP 访问控制（每个请求执行）
        access_by_lua_block {
            local geoip = require("geoip")
            local allowed, country_code = geoip.check_access()
            if not allowed then
                geoip.send_blocked_response(country_code)
                return ngx.exit(403)
            end
        }
        
        # 健康检查端点
        location /health {
            access_log off;
            content_by_lua_block {
                local cjson = require "cjson"
                ngx.status = 200
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    status = "ok",
                    timestamp = ngx.now()
                }))
            }
        }
        
        # 监控指标端点 - Prometheus格式
        location /metrics {
            access_log off;
            content_by_lua_block {
                require("admin.handler").metrics()
            }
        }
        
        # 监控指标端点 - JSON格式
        location /metrics/json {
            access_log off;
            content_by_lua_block {
                require("admin.handler").metrics_json()
            }
        }
        
        # 健康状态端点
        location /health/detailed {
            access_log off;
            content_by_lua_block {
                require("admin.handler").health()
            }
        }
        
        # 管理API端点 - 熔断器状态
        location ~ ^/admin/circuit-breaker$ {
            content_by_lua_block {
                require("admin.handler").circuit_breaker_status()
            }
        }
        
        location ~ ^/admin/circuit-breaker/([^/]+)$ {
            content_by_lua_block {
                require("admin.handler").circuit_breaker_status()
            }
        }
        
        # 管理API端点 - 熔断器手动触发
        location ~ ^/admin/circuit-breaker/([^/]+)/trip$ {
            limit_except POST {
                deny all;
            }
            content_by_lua_block {
                require("admin.handler").circuit_breaker_trip()
            }
        }
        
        # 管理API端点 - 熔断器手动恢复
        location ~ ^/admin/circuit-breaker/([^/]+)/reset$ {
            limit_except POST {
                deny all;
            }
            content_by_lua_block {
                require("admin.handler").circuit_breaker_reset()
            }
        }
        
        # 管理API端点 - 限流器状态
        location ~ ^/admin/rate-limiter$ {
            content_by_lua_block {
                require("admin.handler").rate_limiter_status()
            }
        }
        
        location ~ ^/admin/rate-limiter/(.+)$ {
            content_by_lua_block {
                require("admin.handler").rate_limiter_status()
            }
        }
        
        # 管理API端点 - 限流器重置
        location ~ ^/admin/rate-limiter/([^/]+)/reset$ {
            limit_except POST {
                deny all;
            }
            content_by_lua_block {
                require("admin.handler").rate_limiter_reset()
            }
        }
        
        # 测试端点 - 限流测试
        location /admin/test/rate-limit {
            content_by_lua_block {
                require("admin.handler").test_rate_limit()
            }
        }
        
        # 测试端点 - 熔断器测试
        location /admin/test/circuit-breaker {
            content_by_lua_block {
                require("admin.handler").test_circuit_breaker()
            }
        }
        
        # 管理API端点 - 配置管理
        location = /admin/config {
            content_by_lua_block {
                require("admin.handler").config_manage()
            }
        }
        
        # 管理API端点 - 配置状态
        location = /admin/config/status {
            content_by_lua_block {
                require("admin.handler").config_status()
            }
        }
        
        # 管理API端点 - 配置重置
        location = /admin/config/reset {
            limit_except POST {
                deny all;
            }
            content_by_lua_block {
                require("admin.handler").config_reset()
            }
        }
        
        # 管理API端点 - 配置项操作
        location ~ ^/admin/config/(.+)$ {
            content_by_lua_block {
                require("admin.handler").config_item()
            }
        }
        
        # Provider 路由 - Zerion
        location /zerion {
            set $provider "zerion";
            content_by_lua_block {
                require("proxy.handler").handle()
            }
        }
        
        # Provider 路由 - CoinGecko
        location /coingecko {
            set $provider "coingecko";
            content_by_lua_block {
                require("proxy.handler").handle()
            }
        }
        
        # Provider 路由 - Alchemy
        location /alchemy {
            set $provider "alchemy";
            content_by_lua_block {
                require("proxy.handler").handle()
            }
        }
        
        # 默认 404
        location / {
            content_by_lua_block {
                local cjson = require "cjson"
                ngx.status = 404
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    error = "Not found",
                    message = "Valid providers: /zerion, /coingecko, /alchemy"
                }))
            }
        }
    }
}
