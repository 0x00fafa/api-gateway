# OpenResty API Proxy Gateway - Nginx Configuration
#

# 声明环境变量（必须在 main 上下文，worker_processes 之前）
env ZERION_API_KEY;
env ZERION_ENDPOINT;
env COINGECKO_API_KEY;
env COINGECKO_ENDPOINT;
env ALCHEMY_API_KEY;
env ALCHEMY_ENDPOINT;

worker_processes auto;
error_log /var/log/openresty/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/json;

    log_format json_log escape=json '{'
            '"timestamp":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"status":$status,'
            '"duration_ms":$request_time,'
            '"client_ip":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"user_agent":"$http_user_agent",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';
    #access_log  logs/access.log  main;

    # Lua 模块路径
    lua_package_path "/usr/local/openresty/lualib/custom/?.lua;/usr/local/openresty/lualib/?.lua;;";
    
    # DNS 解析器（用于 Lua HTTP 请求）
    resolver 8.8.8.8 8.8.4.4 ipv6=off;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 添加request_id
    map $http_x_onekey_request_id $real_request_id {
        default   $request_id;
        "~.+"     $http_x_request_id;
    }
    
    # 初始化
    init_by_lua_block {
        require("init").init()
    }
    
    # 上游服务定义
    upstream zerion_upstream {
        server api.zerion.io:443;
        keepalive 100;
        keepalive_timeout 60s;
    }
    
    upstream coingecko_upstream {
        server api.coingecko.com:443;
        keepalive 100;
        keepalive_timeout 60s;
    }
    
    upstream alchemy_upstream {
        server eth-mainnet.g.alchemy.com:443;
        keepalive 100;
        keepalive_timeout 60s;
    }

    server {
        listen       80;
        server_name  api.0x00fafa.com;
        return 301 https://$server_name$request_uri;
    }
    
    # HTTPS server
    server {
        listen       443 ssl;
        http2   on;
        server_name  api.0x00fafa.com;


        # SSL 证书配置
        ssl_certificate      /usr/local/openresty/nginx/ssl/fullchain1.pem;
        ssl_certificate_key  /usr/local/openresty/nginx/ssl/privkey1.pem;

        # SSL 性能与安全性优化
        ssl_protocols TLSv1.2 TLSv1.3; # 禁用不安全的 TLS 1.0/1.1
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;

        # 会话缓存复用，减少握手开销
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # HSTS
        # add_header Strict-Transport-Security "max-age=63072000" always;

        access_log  /var/log/openresty/access.log  json_log;
        
        # 健康检查端点
        location /health {
            access_log off;
            content_by_lua_block {
                local cjson = require "cjson"
                ngx.status = 200
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    status = "ok",
                    timestamp = ngx.now()
                }))
            }
        }
        
        # Provider 路由 - Zerion
        location /zerion {
            set $provider "zerion";
            content_by_lua_block {
                require("proxy.handler").handle()
            }
        }
        
        # Provider 路由 - CoinGecko
        location /coingecko {
            set $provider "coingecko";
            content_by_lua_block {
                require("proxy.handler").handle()
            }
        }
        
        # Provider 路由 - Alchemy
        location /alchemy {
            set $provider "alchemy";
            content_by_lua_block {
                require("proxy.handler").handle()
            }
        }
        
        # 默认 404
        location / {
            content_by_lua_block {
                local cjson = require "cjson"
                ngx.status = 404
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    error = "Not found",
                    message = "Valid providers: /zerion, /coingecko, /alchemy"
                }))
            }
        }
    }
}
